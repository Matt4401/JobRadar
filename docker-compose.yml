version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: jobradar_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JOBRADAR_APP_USER: ${JOBRADAR_APP_USER}
      JOBRADAR_APP_PASSWORD: ${JOBRADAR_APP_PASSWORD}
      JOBRADAR_MIGRATOR_USER: ${JOBRADAR_MIGRATOR_USER}
      JOBRADAR_MIGRATOR_PASSWORD: ${JOBRADAR_MIGRATOR_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./db/docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: jobradar_pma
    restart: always
    environment:
      PMA_HOST: db #db definie au dessus
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '8080:80'
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
